<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Off-Trail | 404 Error</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="icon" type="image/png" href="assets/favicon.png">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        .error-page {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            text-align: center;
            padding: 2rem;
            background-color: var(--bg-primary);
            transition: var(--transition);
        }

        .error-container {
            max-width: 800px;
            width: 100%;
        }

        .error-code {
            font-size: clamp(8rem, 20vw, 15rem);
            font-weight: 900;
            line-height: 0.8;
            margin-bottom: 2rem;
            font-family: 'Space Grotesk', sans-serif;
            background: linear-gradient(to bottom, var(--text-primary), var(--bg-tertiary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            opacity: 0.1;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 0;
            pointer-events: none;
        }

        .error-visual {
            width: 300px;
            height: 300px;
            margin: 0 auto 3rem;
            position: relative;
            z-index: 1;
        }

        .error-visual img {
            width: 100%;
            height: 100%;
            object-fit: contain;
            filter: drop-shadow(0 0 20px rgba(255, 180, 0, 0.2));
        }

        .error-content {
            position: relative;
            z-index: 2;
        }

        .error-content h1 {
            font-size: clamp(2rem, 5vw, 3.5rem);
            margin-bottom: 1rem;
            color: var(--text-primary);
        }

        .error-content p {
            color: var(--text-secondary);
            font-size: 1.1rem;
            max-width: 500px;
            margin: 0 auto 3rem;
        }

        .btn-group {
            display: flex;
            gap: 1.5rem;
            justify-content: center;
        }

        .theme-switch-btn {
            position: fixed;
            top: 30px;
            right: 30px;
            background: var(--bg-secondary);
            border: 1px solid var(--border-color);
            width: 50px;
            height: 50px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            color: var(--text-primary);
            transition: var(--transition);
        }

        .theme-switch-btn:hover {
            border-color: var(--accent-gold);
            transform: rotate(45deg);
        }

        @media (max-width: 768px) {
            .btn-group { flex-direction: column; gap: 1rem; }
            .btn-group .btn { width: 100%; }
        }
    </style>
</head>
<body>

    <button class="theme-switch-btn" onclick="toggleTheme()" id="themeToggle">
        <i data-lucide="sun"></i>
    </button>

    <main class="error-page">
        <div class="error-code">404</div>
        
        <div class="error-container">
            <div class="brand-logo-error" style="margin-bottom: 3rem;">
                <img src="assets/logo.png" alt="TAIGA" style="height: 60px;">
            </div>

            <div class="error-content">
                <h4 class="font-heading" style="color: var(--accent-gold); letter-spacing: 4px; margin-bottom: 1.5rem; font-size: 0.8rem; text-transform: uppercase;">Signal Lost</h4>
                <h1 class="font-heading">You've Wandered <br>Off-Trail.</h1>
                <p>The coordinates you entered do not correspond to any known basecamp in our current inventory.</p>
                
                <div class="btn-group">
                    <a href="index.html" class="btn btn-primary" style="padding: 18px 40px;">Return to Basecamp</a>
                    <a href="products.html" class="btn btn-outline" style="padding: 18px 40px;">View Gear Registry</a>
                </div>
            </div>
        </div>
    </main>

    <script>
        // Inline Theme Logic to maintain consistency without full main.js injection
        function initTheme() {
            const savedTheme = localStorage.getItem('theme') || 'dark';
            document.documentElement.setAttribute('data-theme', savedTheme);
        }
        
        function toggleTheme() {
            const currentTheme = document.documentElement.getAttribute('data-theme');
            const newTheme = currentTheme === 'dark' ? 'light' : 'dark';
            document.documentElement.setAttribute('data-theme', newTheme);
            localStorage.setItem('theme', newTheme);
            lucide.createIcons();
        }

        initTheme();
        lucide.createIcons();
    </script>
</body>
</html>
